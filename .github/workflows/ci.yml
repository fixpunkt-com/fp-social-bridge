name: CI

# Static analysis + coding standards against the lowest (12.4) and highest (13.4)
# supported TYPO3 versions. Reuses the isolated toolchains in .build/ (v13) and
# .build-v12/ (v12) — see DEVELOPMENT.md.

on:
  push:
  pull_request:

jobs:
  phpstan:
    name: PHPStan (TYPO3 ${{ matrix.typo3 }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { typo3: '12.4', php: '8.1', build: '.build-v12', config: '.build-v12/phpstan.neon' }
          - { typo3: '13.4', php: '8.3', build: '.build', config: 'phpstan.neon' }
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php }}'
          tools: composer:v2
          coverage: none
      - name: Install tooling (${{ matrix.build }})
        run: composer update --working-dir=${{ matrix.build }} --no-progress --no-interaction
      - name: PHPStan
        run: ${{ matrix.build }}/vendor/bin/phpstan analyse -c ${{ matrix.config }} --no-progress

  coding-standards:
    name: Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Install tooling
        run: composer update --working-dir=.build --no-progress --no-interaction
      - name: php-cs-fixer (dry-run)
        run: .build/vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.dist.php --dry-run --diff --using-cache=no
